name: Package Release
on:
  push:
    branches:
      - "releases/**"
  workflow_dispatch:

jobs:
  package-release:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - requirements: win-linux-cuda-51.txt
            os: windows-latest
            filename: windows-cuda
        version:
          # Python must match the Blender release the build targets:
          # bundled compiled dependencies (.pyd/.pyc) are not portable across Python versions.
          - python: '3.11'
            filename_suffix: '-blender-4-2'   # Blender 4.2-4.5 (Python 3.11)
          - python: '3.13'
            filename_suffix: '-blender-5-1'   # Blender 5.1+ (Python 3.13)
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: dream_textures
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version.python }}
      - name: Install dependencies into target
        shell: bash
        run: 'python -m pip install -r requirements/${{ matrix.platform.requirements }} --no-cache-dir --target .python_dependencies'
        working-directory: dream_textures
      - name: Zip dependencies with long paths
        shell: bash
        run: 'python ./dream_textures/scripts/zip_dependencies.py'
      - name: Archive Release
        uses: thedoctor0/zip-release@main
        with:
          type: zip
          filename: dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}.zip
          exclusions: '*.git*'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}
          path: dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}.zip
          compression-level: 0
