name: Package Release
on:
  push:
    branches:
      - "releases/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-release:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - requirements: win-linux-cuda-51.txt
            os: windows-latest
            filename: windows-cuda
        version:
          # Python must match the Blender release the build targets:
          # bundled compiled dependencies (.pyd/.pyc) are not portable across Python versions.
          - python: '3.11'
            filename_suffix: '-blender-4-2'   # Blender 4.2-4.5 (Python 3.11)
          - python: '3.13'
            filename_suffix: '-blender-5-1'   # Blender 5.1+ (Python 3.13)
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: dream_textures
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version.python }}
      - name: Install dependencies into target
        shell: bash
        run: 'python -m pip install -r requirements/${{ matrix.platform.requirements }} --no-cache-dir --target .python_dependencies'
        working-directory: dream_textures
      - name: Zip dependencies with long paths
        shell: bash
        run: 'python ./dream_textures/scripts/zip_dependencies.py'
      - name: Archive Release
        # plain 7z (preinstalled on runners) instead of a third-party action:
        # this workflow holds contents:write, so keep external code out of it
        shell: bash
        run: '7z a -tzip dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}.zip dream_textures "-xr!*.git*"'
      - name: Compress with 7z
        # LZMA fits the CUDA build under GitHub's 2GB release asset limit; users extract
        # the .7z to get the installable .zip (same scheme as upstream releases)
        shell: bash
        run: '7z a -t7z -mx=7 dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}.7z dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}.zip'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}
          path: dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}.7z
          compression-level: 0
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" "dream_textures-${{ matrix.platform.filename }}${{ matrix.version.filename_suffix }}.7z" --repo "$GITHUB_REPOSITORY" --clobber
